# Standalone nginx.conf — no system include paths needed (works in Nix environment).
# Inline mime types and fastcgi params so this file is fully self-contained.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    types {
        text/html                   html htm shtml;
        text/css                    css;
        text/plain                  txt;
        application/javascript      js mjs;
        application/json            json;
        application/xml             xml;
        image/gif                   gif;
        image/jpeg                  jpeg jpg;
        image/png                   png;
        image/svg+xml               svg svgz;
        image/webp                  webp;
        image/x-icon                ico;
        font/woff                   woff;
        font/woff2                  woff2;
        font/ttf                    ttf;
        application/vnd.ms-fontobject eot;
        application/octet-stream    bin;
    }

    default_type application/octet-stream;
    access_log   /dev/stdout;
    sendfile     on;
    keepalive_timeout 65;
    client_max_body_size 64M;

    server {
        listen 80;
        server_name _;
        root  /app/public;
        index index.php;

        # Reverb WebSocket — proxy /app/* to internal Reverb server
        location /app {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 120s;
        }

        # Static assets — long cache
        location ~* \.(css|js|mjs|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Laravel front controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;

            # Inline fastcgi params (no include needed)
            fastcgi_param QUERY_STRING      $query_string;
            fastcgi_param REQUEST_METHOD    $request_method;
            fastcgi_param CONTENT_TYPE      $content_type;
            fastcgi_param CONTENT_LENGTH    $content_length;
            fastcgi_param SCRIPT_FILENAME   $realpath_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME       $fastcgi_script_name;
            fastcgi_param REQUEST_URI       $request_uri;
            fastcgi_param DOCUMENT_URI      $document_uri;
            fastcgi_param DOCUMENT_ROOT     $document_root;
            fastcgi_param SERVER_PROTOCOL   $server_protocol;
            fastcgi_param REQUEST_SCHEME    $scheme;
            fastcgi_param HTTPS             $https if_not_empty;
            fastcgi_param GATEWAY_INTERFACE CGI/1.1;
            fastcgi_param SERVER_SOFTWARE   nginx/$nginx_version;
            fastcgi_param REMOTE_ADDR       $remote_addr;
            fastcgi_param REMOTE_PORT       $remote_port;
            fastcgi_param SERVER_ADDR       $server_addr;
            fastcgi_param SERVER_PORT       $server_port;
            fastcgi_param SERVER_NAME       $server_name;
            fastcgi_param REDIRECT_STATUS   200;

            fastcgi_read_timeout 120s;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
